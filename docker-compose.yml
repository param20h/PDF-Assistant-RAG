version: '3.8'

services:
  app:
    build: .
    ports:
      - "7860:7860"
    volumes:
      - app_data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-me}
      - HF_TOKEN=${HF_TOKEN}
      - DATABASE_URL=sqlite:///./data/app.db
      - UPLOAD_DIR=./data/uploads
      - CHROMA_PERSIST_DIR=./data/chroma_db
    restart: unless-stopped

volumes:
  app_data:
